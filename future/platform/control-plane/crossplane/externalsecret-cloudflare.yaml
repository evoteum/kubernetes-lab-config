# Cloudflare API token for the ProviderConfig.
# Reads from OpenBao: cloudflare/api-token -> api_token
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-credentials
  namespace: crossplane
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cloudflare-credentials
    template:
      type: Opaque
      data:
        credentials: '{"api_token":"{{ .api_token }}"}'
  data:
    - secretKey: api_token
      remoteRef:
        key: cloudflare/api-token
        property: api_token
---
# Tunnel secret for ZeroTrustTunnelCloudflared.
# Must be a base64-encoded random value of at least 32 bytes.
# Generate with: openssl rand 32 | base64
# Reads from OpenBao: itsbeginningtolookalotlikechristmas/cloudflare-tunnel-secret -> secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ibtlallc-cloudflare-tunnel-secret
  namespace: crossplane
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: ibtlallc-cloudflare-tunnel-secret
  data:
    - secretKey: secret
      remoteRef:
        key: itsbeginningtolookalotlikechristmas/cloudflare-tunnel-secret
        property: secret
