route:
  dashboard:
    host:
    labels: {}
    annotations: {}
    parentRefs: []

# -- CSI driver name prefix for cephfs, rbd and nfs.
# @default -- `namespace name where rook-ceph operator is deployed`
csiDriverNamePrefix:
