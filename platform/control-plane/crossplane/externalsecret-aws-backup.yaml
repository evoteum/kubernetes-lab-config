# Reads from OpenBao (secret/data/aws/backup) and renders the AWS shared-credentials
# file format that the upbound AWS provider expects in its ProviderConfig secretRef.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aws-backup-credentials
  namespace: crossplane
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: aws-backup-credentials
    template:
      type: Opaque
      data:
        creds: |
          [default]
          aws_access_key_id={{ .access_key_id }}
          aws_secret_access_key={{ .secret_access_key }}
  data:
    - secretKey: access_key_id
      remoteRef:
        key: aws/backup
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: aws/backup
        property: secret_access_key
