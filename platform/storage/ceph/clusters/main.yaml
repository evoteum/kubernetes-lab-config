apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: ceph-cluster-main
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v19.2.3
  dataDirHostPath: /var/lib/rook
  mon:
    count: 3
    allowMultiplePerNode: false
  dashboard:
    enabled: true
  placement:
    all:
      tolerations:
        - key: storage-only
          operator: Equal
          value: "true"
          effect: NoSchedule
  storage:
    useAllNodes: false
    useAllDevices: false
    nodes:
      - name: k8s-07
        devices:
          - name: /dev/disk/by-id/wwn-0x5057440000000001
      - name: k8s-08
        devices:
          - name: /dev/disk/by-id/wwn-0x5057440000000001
      - name: k8s-09
        devices:
          - name: /dev/disk/by-id/wwn-0x5057440000000001
