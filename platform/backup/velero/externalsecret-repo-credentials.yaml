# Kopia's repository encryption passphrase. This is the client-side encryption key:
# data is encrypted before it ever leaves the cluster. If this is lost, backups in
# S3 are unrecoverable -- back this value up outside of OpenBao too.
#
# Velero only auto-generates this secret if it doesn't already exist, so creating
# it ourselves (with our own passphrase) before the node-agent's first run is what
# makes the encryption key ours rather than a random one Velero would otherwise pick.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-repo-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: velero-repo-credentials
    template:
      type: Opaque
      data:
        repository-password: "{{ .kopia_passphrase }}"
  data:
    - secretKey: kopia_passphrase
      remoteRef:
        key: velero
        property: kopia_passphrase
