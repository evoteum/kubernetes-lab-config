# AWS creds for the velero-plugin-for-aws, in the shared-credentials-file format
# the plugin expects (referenced as `credentials.existingSecret` in the velero
# helm release, key `cloud`).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-cloud-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: velero-cloud-credentials
    template:
      type: Opaque
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key_id }}
          aws_secret_access_key={{ .secret_access_key }}
  data:
    - secretKey: access_key_id
      remoteRef:
        key: aws/backup
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: aws/backup
        property: secret_access_key
