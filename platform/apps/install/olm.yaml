apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: olm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    docsUrl: https://operator-framework.github.io/olm-book/
spec:
  project: default
  source:
    repoURL: https://github.com/evoteum/kubernetes-lab-config
    targetRevision: HEAD
    path: platform/olm
  destination:
    server: https://kubernetes.default.svc
    namespace: olm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
